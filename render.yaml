services:
  - type: web
    name: campus-market-api
    runtime: node
    buildCommand: npm install && npm run build # Note: adjusted if using pnpm or just npm
    startCommand: node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: MONGODB_URI
        sync: false # Should be set in Render dashboard
      - key: JWT_SECRET
        sync: false # Should be set in Render dashboard
      - key: ALLOWED_ORIGINS
        value: "*" # Update with your Vercel URL after deployment
      - key: EMAIL_PASSWORD
        sync: false # Should be set in Render dashboard
      - key: USE_CLUSTERING
        value: "false"
